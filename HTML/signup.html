<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login & Sign Up</title>
    <link rel="stylesheet" href="../CSS/index.css" />
  </head>
  <body>
    <div class="container">
      <form id="registerForm" method="POST" action="/login">
        <div class="heading1">
          <h1 id="formTitle">Login</h1>
        </div>
        <div class="form-group" id="usernameField">
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Username"
          />
        </div>
        <div class="form-group">
          <input
            type="email"
            id="email"
            name="email"
            placeholder="College Email"
            required
          />
        </div>
        <div class="form-group">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            required
          />
        </div>
        <div class="form-group" id="roleField">
          <label for="role">Role:</label>
          <select id="role" name="role">
            <option value="" disabled selected>Select your role:</option>
            <option value="participant">Participant</option>
            <option value="club_admin">Club Admin</option>
          </select>
        </div>
        <div class="form-group" id="clubField">
          <label for="club">Club:</label>
          <select id="club" name="club">
            <option value="" disabled selected>Select your club</option>
            <option value="Anime Club">Anime Club</option>
            <option value="Coding Club">Coding Club</option>
            <option value="Cyber Warriors Club">Cyber Warriors Club</option>
            <option value="Dance Club">Dance Club</option>
            <option value="Drama Club">Drama Club</option>
            <option value="Gaming Club">Gaming Club</option>
            <option value="GDSC Club">GDSC Club</option>
            <option value="GFG Club">GFG Club</option>
            <option value="Photography Club">Photography Club</option>
            <option value="UX Club">UX Club</option>
          </select>
        </div>
        <div>
          <button class="but" type="submit" id="submitButton">Login</button>
        </div>
        <div class="switch">
          <p id="switchMessage">
            Don't have an account? <a href="" id="toggleLink">Sign Up</a>
          </p>
        </div>
      </form>
    </div>
  </body>
  <script src="../JS/signup.js"></script>
</html>
