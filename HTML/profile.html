<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <link rel="stylesheet" href="../CSS/profile.css">
    <link rel="stylesheet" href="../CSS/event-details.css">
</head>
<body>
    <div class="navbar">
        <div class="logo">EventCheck</div>
        <div class="nav-links">
          <a href="../index.html">Events</a>
          <a href="/HTML/create-event.html" id="create-tab">Create</a>
        </div>
        <div class="profile-dropdown">
          <a href="#" title="user icons">
            <img src="../Images/user.png" alt="Profile Icon" class="profile-icon" />
          </a>
          <div class="dropdown-menu">
            <a href="#" id="log-in-link">Log In</a>
            <a href="#" id="profile-link" class="hidden">Profile</a>
            <a href="#" id="sign-out-link" class="hidden">Sign Out</a>
          </div>
        </div>
      </div>
    <div class="profile-container">
        <h1>User Profile</h1>
        <div id="profile">
            <form>
                <label for="username"><strong>Username:</strong></label>
                <input type="text" id="username" value="" readonly />
        
                <label for="email"><strong>Email:</strong></label>
                <input type="email" id="email" value="" readonly />
        
                <label for="role"><strong>Role: </strong></label>
                <input type="text" id="role" value="" readonly />
                
                <label for="clubName"><strong>Club: </strong></label>
                <input type="text" id="clubName" value="" readonly />
            </form>
            </form>
        </div>
        <form id="edit-form" class="hidden">
            <label for="edit-username">Name:</label>
            <input type="text" id="edit-username" value="">

            <label for="edit-email">Email:</label>
            <input type="email" id="edit-email" value="" readonly>

            <label for="edit-role">Role:</label>
            <input type="text" id="edit-role" value="" readonly>

            <label for="edit-clubName">Club :</label>
            <input type="text" id="edit-clubName" value="" readonly>
        </form>
        <button id="edit-button">Edit</button>
        <button id="save-button" class="hidden">Save</button>
    </div>
    <script src="../JS/Main JS Files/event-page.js" type="module"></script>
</body>
</html>
