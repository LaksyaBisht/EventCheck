<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration form</title>
    <link rel="stylesheet" href="../CSS/event-register.css">
  </head>
  <body>
    <div class="form-container">
        <h1></h1>
        <form id="registration-form">
          <input type="text" id="name" name="name" placeholder="Your Name" required>
          <input type="email" id="email" name="email" placeholder="Your Email" required>
          <input type="text" id="registration-num" name="registration-num" placeholder="Your Registration Number" required>
          <input type="tel" id="phone" name="phone" placeholder="Your Phone Number" required>
          <textarea id="team-details" name="team-details" placeholder="Team member name and registration number" rows="5" required></textarea>
          <button type="submit" class="submit-btn">Submit Registration</button>
        </form>
      </div>
    <script src="../JS/event-register.js" type="module"></script>
    </body>
</html>
