<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Event</title>
    <link rel="stylesheet" href="../CSS/create-event.css" />
  </head>
  <body>
    <div class="navbar">
      <div class="logo">EventCheck</div>
      <div class="nav-links">
        <a href="../index.html">Events</a>
        <a href="/HTML/create-event.html" id="create-tab">Create</a>
        <a href="/HTML/registrations.html" id="register-tab">Registrations</a>
        <a href="/HTML/history.html" id="history-tab">History</a>
      </div>
      <div class="profile-dropdown">
        <a href="#" title="user icons">
          <img src="../Images/user.png" alt="Profile Icon" class="profile-icon" />
        </a>
        <div class="dropdown-menu">
          <a href="#" id="log-in-link">Log In</a>
          <a href="#" id="profile-link" >Profile</a>
          <a href="#" id="sign-out-link">Sign Out</a>
        </div>
      </div>
    </div>

    <div class="create-event-container">
      <h1 id="heading">Create New Event</h1>
      <form id="create-event-form">
        <label for="event-name">Event Name:</label>
        <input type="text" id="event-name" name="event-name" required />

        <label for="event-date">Event Date:</label>
        <input type="date" id="event-date" name="event-date" required />

        <label for="event-description">Event Description:</label>
        <textarea
          id="event-description"
          name="event-description"
          rows="4"
          required
        ></textarea>

        <label for="club-name">Club Name:</label>
        <input type="text" id="club-name" name="club-name" required />

        <label for="venue">Venue:</label>
        <input type="text" id="venue" name="venue" required />

        <label for="contact">Contact: </label>
        <input type="email" id="contact" name="contact" required />

        <label for="team-size">Team Size:</label>
        <input type="number" id="team-size" name="team-size" min="1" required />

        <label for="rewards">Rewards:</label>
        <input type="text" id="rewards" name="rewards" required />

        <button type="submit">Create Event</button>
      </form>
    </div>
  </body>
  <script src="../JS/Main JS Files/create-page.js" type="module"></script>
  </html>
